name: Credit Risk CI/CD
on: [push]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install . pytest httpx joblib scikit-learn
          # CREATE DUMMY ARTIFACTS SO API DOESN'T CRASH
          mkdir -p models data/processed
          python -c "import joblib; from sklearn.ensemble import RandomForestClassifier; from sklearn.preprocessing import StandardScaler; joblib.dump(RandomForestClassifier().fit([[0]], [0]), 'models/model.pkl'); joblib.dump(StandardScaler().fit([[0]]), 'data/processed/preprocessor.pkl')"


      - name: Run Tests
        run: |
          # This ensures your code doesn't have syntax errors
          pytest tests/
